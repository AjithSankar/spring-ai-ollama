services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  spring-app:
    build: .
    container_name: ai-chatbot
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434

volumes:
  ollama_data: